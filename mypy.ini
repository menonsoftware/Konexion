[mypy]
# Global mypy configuration for Konexion backend

# Import discovery
mypy_path = .
packages = konexion_backend
namespace_packages = True

# Platform configuration
python_version = 3.12
platform = linux

# Error output
show_error_codes = True
show_column_numbers = True
show_error_context = True
color_output = True

# Strictness flags
strict = True
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Per-module options
[mypy-groq.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-websockets.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-pydantic_settings.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-authlib.*]
ignore_missing_imports = True

# These two files use `# type: ignore[misc]` to suppress subclassing-Any errors
# that only appear in the pre-commit mypy env (where pydantic-settings and
# sqlalchemy are not installed).  Disable warn_unused_ignores locally so the
# comment is tolerated when the packages are present and the error doesn't fire.
[mypy-konexion_backend.config]
warn_unused_ignores = False

[mypy-konexion_backend.models.db_model]
warn_unused_ignores = False
